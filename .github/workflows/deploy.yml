name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: true

jobs:
  cloudflare:
    name: Cloudflare Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Check static build
        run: npm run check:static
      - name: Deploy Worker Assets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm exec --yes --package wrangler -- wrangler deploy
      - name: Smoke release.bar assets
        run: |
          set -euo pipefail
          expected_js="$(grep -Eo '/assets/index-[^"]+\.js' dist/index.html | head -n 1)"
          expected_css="$(grep -Eo '/assets/index-[^"]+\.css' dist/index.html | head -n 1)"
          live_js=""
          live_css=""
          for _ in $(seq 1 40); do
            live_html="$(curl -fsSL "https://release.bar/steipete?ship=${GITHUB_SHA}")"
            live_js="$(printf '%s\n' "$live_html" | grep -Eo '/assets/index-[^"]+\.js' | head -n 1)"
            live_css="$(printf '%s\n' "$live_html" | grep -Eo '/assets/index-[^"]+\.css' | head -n 1)"
            if [ "$live_js" = "$expected_js" ] && [ "$live_css" = "$expected_css" ]; then
              break
            fi
            sleep 3
          done
          test "$live_js" = "$expected_js"
          test "$live_css" = "$expected_css"
          for _ in $(seq 1 20); do
            if curl -fsSL "https://release.bar${live_js}" >/dev/null \
              && curl -fsSL "https://release.bar${live_css}" >/dev/null; then
              exit 0
            fi
            sleep 3
          done
          curl -fsSL "https://release.bar${live_js}" >/dev/null
          curl -fsSL "https://release.bar${live_css}" >/dev/null
      - name: Smoke release.bar routes
        run: |
          set -euo pipefail
          curl -fsSL "https://release.bar/?ship=${GITHUB_SHA}" >/dev/null
          curl -fsSL "https://release.bar/steipete?ship=${GITHUB_SHA}" >/dev/null
          curl -fsSL "https://release.bar/openclaw/openclaw?ship=${GITHUB_SHA}" >/dev/null
          curl -fsSL "https://release.bar/api/_discover?period=week&ship=${GITHUB_SHA}" \
            | node -e 'let body="";process.stdin.on("data",d=>body+=d);process.stdin.on("end",()=>{const json=JSON.parse(body); if (!Array.isArray(json.projects)) process.exit(1);})'
