<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="Release freshness dashboard for open source maintainers." />
    <meta name="theme-color" content="#080908" />
    <meta property="og:title" content="ReleaseDeck" />
    <meta
      property="og:description"
      content="Release freshness across open source projects: latest versions, stale releases, commits since release, issues, PRs, and CI."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://releasedeck.dev/" />
    <meta property="og:site_name" content="ReleaseDeck" />
    <meta property="og:image" content="https://releasedeck.dev/og-card.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:creator" content="@steipete" />
    <meta name="twitter:title" content="ReleaseDeck" />
    <meta
      name="twitter:description"
      content="Release freshness across open source projects: versions, stale releases, commits, issues, PRs, and CI."
    />
    <meta name="twitter:image" content="https://releasedeck.dev/og-card.png" />
    <title>ReleaseDeck</title>
    <link rel="canonical" href="https://releasedeck.dev/" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topline">
        <div>
          <p class="eyebrow">ReleaseDeck</p>
          <h1 id="dashboardTitle">@steipete</h1>
          <p id="subtitle" class="subtitle">
            Open source release freshness across steipete and OpenClaw.
          </p>
        </div>
        <div class="top-actions">
          <button id="settingsButton" class="icon-button" type="button" aria-expanded="false">
            settings
          </button>
          <div class="status" aria-live="polite">
            <span class="pulse"></span>
            <span id="generated">loading</span>
          </div>
        </div>
      </header>

      <div id="settingsPanel" class="settings-panel" aria-label="Dashboard settings">
        <div>
          <strong>dashboard</strong>
          <p id="settingsSummary">all visible</p>
          <form id="sourceForm" class="source-form">
            <input
              id="sourceInput"
              type="text"
              autocomplete="off"
              spellcheck="false"
              placeholder="@owner or owner/repo"
            />
            <button type="submit">add</button>
          </form>
          <button id="signInButton" class="secondary-action" type="button">
            sign in for private orgs
          </button>
        </div>
        <section>
          <h2>owners</h2>
          <div id="ownerToggles" class="setting-list"></div>
        </section>
        <section>
          <h2>repos</h2>
          <div id="repoToggles" class="setting-list repo-settings"></div>
        </section>
      </div>

      <section class="console" aria-label="Project search and metrics">
        <div class="prompt">
          <span class="mark">$</span>
          <input
            id="search"
            type="search"
            autocomplete="off"
            spellcheck="false"
            placeholder="search repos, languages, owners, versions"
          />
        </div>
        <div class="metrics">
          <div>
            <span id="repoCount">--</span>
            <label>repos</label>
          </div>
          <div>
            <span id="releasedCount">--</span>
            <label>released</label>
          </div>
          <div>
            <span id="commitCount">--</span>
            <label>commits since release</label>
          </div>
          <div>
            <span id="staleCount">--</span>
            <label>need attention</label>
          </div>
        </div>
      </section>

      <nav class="filters" aria-label="Filters">
        <button class="active" data-filter="all" type="button">all</button>
        <button data-filter="hot" type="button">hot</button>
        <button data-filter="busy" type="button">busy</button>
        <button data-filter="fresh" type="button">fresh</button>
        <label class="dev-toggle">
          <input id="devMode" type="checkbox" />
          <span>dev</span>
        </label>
      </nav>

      <section class="table-wrap" aria-label="Repositories">
        <div class="table-head">
          <button data-sort="repo" type="button">repo</button>
          <button data-sort="version" type="button">version</button>
          <button data-sort="release" type="button">release</button>
          <button data-sort="since" type="button">since</button>
          <button data-sort="activity" type="button" aria-current="true">activity</button>
          <button class="dev-only" data-sort="issues" type="button">issues</button>
          <button class="dev-only" data-sort="prs" type="button">prs</button>
          <button class="dev-only" data-sort="ci" type="button">ci</button>
        </div>
        <div id="projects" class="projects"></div>
      </section>
    </main>

    <template id="projectRow">
      <article class="project">
        <div class="repo-cell">
          <a class="repo-link" target="_blank" rel="noreferrer"></a>
          <p class="description"></p>
          <div class="tags"></div>
        </div>
        <div class="version-cell"></div>
        <div class="release-cell"></div>
        <div class="since-cell"></div>
        <div class="activity-cell"></div>
        <div class="issues-cell dev-only"></div>
        <div class="prs-cell dev-only"></div>
        <div class="ci-cell dev-only"></div>
      </article>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
